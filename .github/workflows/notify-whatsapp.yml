name: Notify WhatsApp on push to main

on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build and send WhatsApp notification
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          BRANCH: ${{ github.ref_name }}
          WEBHOOK_URL: ${{ secrets.SUPABASE_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          # Construit le payload JSON en échappant correctement les caractères spéciaux
          PAYLOAD=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg author "$AUTHOR" \
            --arg branch "$BRANCH" \
            '{commit_sha:$sha, commit_message:$msg, author:$author, branch:$branch}')

          # Envoie la requête, capture le code HTTP sans exposer le secret dans les logs
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-github-secret: $WEBHOOK_SECRET" \
            -d "$PAYLOAD")

          echo "Response HTTP code: $HTTP_CODE"
          cat /tmp/response.txt

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Notification failed with HTTP $HTTP_CODE"
            exit 1
          fi
