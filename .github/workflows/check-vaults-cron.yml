name: Trigger Check Vaults Cron

on:
  schedule:
    # S'exécute toutes les 15 minutes (Format POSIX Cron)
    - cron: "*/15 * * * *"
  workflow_dispatch: # Permet de forcer le déclenchement manuel sur GitHub pour tester

jobs:
  trigger-edge-function:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "https://jiuqrmcwisjirahhlgte.supabase.co/functions/v1/check-vaults" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
